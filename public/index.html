<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#05070d;
  color:white;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
}

.container{
  width:90%;
  max-width:400px;
  background:rgba(255,255,255,0.05);
  padding:25px;
  border-radius:20px;
  text-align:center;
}

input, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#00ff99;
}
</style>
</head>

<body>

<div class="container">
  <h2>⚔️ WAR PRESALE</h2>

  <button onclick="connect()">Connect Wallet</button>
  <p id="wallet"></p>

  <input id="sol" placeholder="Enter SOL (0.1 - 1)">

  <button onclick="mint()">MINT WAR</button>

  <p id="stats"></p>
  <p id="status"></p>
</div>

<script>
let wallet = null;
const receiver = "Egp6tFjnQV9pZ277rS2m16fQbFPKYeZKGQ5RVYd9Mxec";

async function connect(){
  const res = await window.solana.connect();
  wallet = res.publicKey.toString();
  document.getElementById("wallet").innerText = wallet;
}

async function loadStats(){
  const res = await fetch("/api/stats");
  const data = await res.json();

  document.getElementById("stats").innerText =
    "Minted: " + data.totalWar + " WAR";
}

setInterval(loadStats,5000);
loadStats();

async function mint(){

  try{

    if(!wallet) return alert("Connect wallet dulu");

    const sol = Number(document.getElementById("sol").value);

    if(sol < 0.1) return alert("Min 0.1 SOL");
    if(sol > 1) return alert("Max 1 SOL");

    const connection = new solanaWeb3.Connection(
      "https://mainnet.helius-rpc.com/?api-key=f425a1d0-c252-46fb-b61f-344f2a5e0b7c"
    );

    const tx = new solanaWeb3.Transaction().add(
      solanaWeb3.SystemProgram.transfer({
        fromPubkey: window.solana.publicKey,
        toPubkey: new solanaWeb3.PublicKey(receiver),
        lamports: Math.floor(sol * 1e9)
      })
    );

    tx.feePayer = window.solana.publicKey;

    const { blockhash } = await connection.getLatestBlockhash();
    tx.recentBlockhash = blockhash;

    const signed = await window.solana.signTransaction(tx);

    const sig = await connection.sendRawTransaction(signed.serialize());

    document.getElementById("status").innerText = "TX: " + sig;

    const verify = await fetch("/api/verify",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ wallet, signature:sig })
    });

    const result = await verify.json();

    document.getElementById("status").innerText =
      result.error || "✅ Success | " + result.war + " WAR";

    loadStats();

  }catch(e){
    alert(e.message);
  }
}
</script>

</body>
</html>
