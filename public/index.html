<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAR Presale</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

/* VIDEO BACKGROUND */
#bgVideo{
  position:fixed;
  right:0;
  bottom:0;
  min-width:100%;
  min-height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.4) blur(2px);
}

/* DARK OVERLAY */
.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

/* UI CONTAINER */
.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:400px;
  background:rgba(0,0,0,0.6);
  padding:25px;
  border-radius:20px;
  text-align:center;
  backdrop-filter:blur(10px);
}

/* INPUT & BUTTON */
input, button{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:none;
}

button{
  background:#00ff99;
  font-weight:bold;
  cursor:pointer;
}

/* TEXT */
.small{
  font-size:12px;
  opacity:0.7;
}

/* PROGRESS BAR */
.progress{
  height:8px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:10px;
}

.bar{
  height:100%;
  width:0%;
  background:#00ff99;
}

/* BULLET */
.bullet{
  position:absolute;
  width:6px;
  height:6px;
  background:#fff;
  border-radius:50%;
}

/* EXPLOSION */
.explosion{
  position:absolute;
  width:20px;
  height:20px;
  background:radial-gradient(circle,#fff,#ff0044,transparent);
  border-radius:50%;
  animation:boom 0.4s ease-out;
}

@keyframes boom{
  from{transform:scale(0.5);opacity:1;}
  to{transform:scale(3);opacity:0;}
}
</style>
</head>

<body>

<!-- VIDEO -->
<video autoplay muted loop playsinline id="bgVideo">
  <source src="https://x.com/i/status/2033005093029617790" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

  <h2>WAR PRESALE</h2>

  <button id="walletBtn" onclick="toggleWallet()">Connect Wallet</button>
  <p id="wallet" class="small"></p>

  <input id="sol" placeholder="Enter SOL (0.1 - 1)">

  <button onclick="mint()">Mint</button>

  <div class="progress">
    <div id="bar" class="bar"></div>
  </div>

  <p id="stats" class="small"></p>
  <p id="status" class="small"></p>

</div>

<script>
let wallet = null;

/* CONNECT / DISCONNECT */
async function toggleWallet(){

  if(!window.solana) return alert("Use Phantom");

  if(wallet){
    await window.solana.disconnect();
    wallet = null;
    document.getElementById("wallet").innerText = "";
    document.getElementById("walletBtn").innerText = "Connect Wallet";
    return;
  }

  const res = await window.solana.connect();
  wallet = res.publicKey.toString();

  document.getElementById("wallet").innerText =
    wallet.slice(0,6)+"..."+wallet.slice(-4);

  document.getElementById("walletBtn").innerText = "Disconnect";
}

/* LOAD STATS */
async function loadStats(){
  const res = await fetch("/api/stats");
  const data = await res.json();

  document.getElementById("stats").innerText =
    "Minted: " + data.totalWar;

  const percent = (data.totalWar / 100000000) * 100;
  document.getElementById("bar").style.width = percent + "%";
}

setInterval(loadStats,5000);
loadStats();

/* MINT */
async function mint(){

  try{

    if(!wallet) return alert("Connect wallet first");

    const sol = Number(document.getElementById("sol").value);

    if(sol < 0.1) return alert("Minimum 0.1 SOL");
    if(sol > 1) return alert("Maximum 1 SOL");

    const receiver = "Egp6tFjnQV9pZ277rS2m16fQbFPKYeZKGQ5RVYd9Mxec";

    const connection = new solanaWeb3.Connection(
      "https://mainnet.helius-rpc.com/?api-key=f425a1d0-c252-46fb-b61f-344f2a5e0b7c"
    );

    const tx = new solanaWeb3.Transaction().add(
      solanaWeb3.SystemProgram.transfer({
        fromPubkey: window.solana.publicKey,
        toPubkey: new solanaWeb3.PublicKey(receiver),
        lamports: Math.floor(sol * 1e9)
      })
    );

    tx.feePayer = window.solana.publicKey;

    const { blockhash } = await connection.getLatestBlockhash();
    tx.recentBlockhash = blockhash;

    const signed = await window.solana.signTransaction(tx);
    const sig = await connection.sendRawTransaction(signed.serialize());

    document.getElementById("status").innerText = "TX: " + sig;

    const verify = await fetch("/api/verify",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({ wallet, signature:sig })
    });

    const result = await verify.json();

    document.getElementById("status").innerText =
      result.error || ("Success: " + result.war + " WAR");

    loadStats();

  }catch(e){
    alert(e.message);
  }
}

/* WAR EFFECT */
function explosion(x,y){
  const e = document.createElement("div");
  e.className = "explosion";
  e.style.left = x + "vw";
  e.style.top = y + "vh";
  document.body.appendChild(e);
  setTimeout(()=>e.remove(),400);
}

function shoot(){
  const x1 = Math.random()*100;
  const y1 = Math.random()*100;
  const x2 = Math.random()*100;
  const y2 = Math.random()*100;

  const b = document.createElement("div");
  b.className = "bullet";
  document.body.appendChild(b);

  let t = 0;

  const anim = setInterval(()=>{
    t += 0.03;

    if(t >= 1){
      explosion(x2,y2);
      b.remove();
      clearInterval(anim);
      return;
    }

    const x = x1 + (x2-x1)*t;
    const y = y1 + (y2-y1)*t;

    b.style.left = x + "vw";
    b.style.top = y + "vh";

  },16);
}

setInterval(shoot,900);
</script>

</body>
  </html>
