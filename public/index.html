<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body{
  margin:0;
  background:black;
  color:white;
  font-family:Arial;
}

.box{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:400px;
  background:#111;
  padding:20px;
  border-radius:15px;
  display:flex;
  flex-direction:column;
  gap:10px;
}

button{
  padding:12px;
  background:#00ff99;
  border:none;
  border-radius:10px;
  font-weight:bold;
}

input{
  padding:12px;
  border-radius:10px;
  border:none;
  background:#222;
  color:white;
}
</style>
</head>

<body>

<div class="box">

<h2>WAR PRESALE</h2>

<button onclick="connect()">Connect Wallet</button>

<div id="wallet"></div>

<input id="amount" placeholder="0.1 - 1 SOL">

<button onclick="mint()">Mint</button>

<div id="status"></div>

</div>

<script>
let wallet = null;

async function connect(){
  const res = await window.solana.connect();
  wallet = res.publicKey.toString();
  document.getElementById("wallet").innerText = wallet;
}

async function mint(){

  const amount = Number(document.getElementById("amount").value);

  const req = await fetch("/api/createTx",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({ wallet, amount })
  });

  const data = await req.json();

  if(data.error){
    return alert(data.error);
  }

  const conn = new solanaWeb3.Connection("https://api.mainnet-beta.solana.com");

  const tx = new solanaWeb3.Transaction().add(
    solanaWeb3.SystemProgram.transfer({
      fromPubkey: window.solana.publicKey,
      toPubkey: new solanaWeb3.PublicKey(data.to),
      lamports: amount * 1e9
    })
  );

  tx.feePayer = window.solana.publicKey;

  const { blockhash } = await conn.getLatestBlockhash();
  tx.recentBlockhash = blockhash;

  const signed = await window.solana.signTransaction(tx);
  const sig = await conn.sendRawTransaction(signed.serialize());

  document.getElementById("status").innerText = "Verifying...";

  const verify = await fetch("/api/verify",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body: JSON.stringify({
      wallet,
      signature: sig
    })
  });

  const result = await verify.json();

  document.getElementById("status").innerText =
    result.error || "Success";
}
</script>

</body>
</html>
