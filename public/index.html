<!DOCTYPE html>
<html lang="en">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WAR Presale</title>

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  color:white;
  overflow:hidden;
}

#bgVideo{
  position:fixed;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.6);
}

.overlay{
  position:fixed;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.5);
  z-index:-1;
}

.container{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:420px;
  display:flex;
  flex-direction:column;
  gap:12px;
  background:rgba(0,0,0,0.6);
  padding:25px;
  border-radius:20px;
}

.row{
  display:flex;
  gap:10px;
}

input,button{
  padding:14px;
  border-radius:10px;
  border:none;
}

input{flex:1;}

button{
  background:#00ff99;
  cursor:pointer;
}

.progress{
  height:8px;
  background:#222;
  border-radius:10px;
}

.bar{
  height:100%;
  width:0%;
  background:#00ff99;
}
</style>
</head>

<body>

<video autoplay muted loop id="bgVideo">
  <source src="war.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="container">

<h2>WAR PRESALE</h2>

<button id="walletBtn" onclick="toggleWallet()">Connect</button>

<div id="wallet"></div>

<div class="row">
  <input id="sol" placeholder="0.1 - 1 SOL">
  <button onclick="mint()">Mint</button>
</div>

<div class="progress">
  <div id="bar" class="bar"></div>
</div>

<div id="stats"></div>
<div id="status"></div>

</div>

<script>
let wallet = null;

async function toggleWallet(){

  if(!window.solana) return alert("Use Phantom");

  if(wallet){
    await window.solana.disconnect();
    wallet = null;
    walletBtn.innerText = "Connect";
    return;
  }

  const res = await window.solana.connect();
  wallet = res.publicKey.toString();

  walletBtn.innerText = "Disconnect";
}

async function loadStats(){
  const res = await fetch("/api/stats");
  const data = await res.json();

  document.getElementById("stats").innerText =
    "Minted: " + data.totalWar;
}

setInterval(loadStats,5000);

async function mint(){

  if(!wallet) return alert("Connect wallet");

  const sol = Number(document.getElementById("sol").value);

  const connection = new solanaWeb3.Connection(
    "https://rpc.ankr.com/solana"
  );

  const tx = new solanaWeb3.Transaction().add(
    solanaWeb3.SystemProgram.transfer({
      fromPubkey: window.solana.publicKey,
      toPubkey: new solanaWeb3.PublicKey("YOUR_WALLET_HERE"),
      lamports: sol * 1e9
    })
  );

  tx.feePayer = window.solana.publicKey;
  const { blockhash } = await connection.getLatestBlockhash();
  tx.recentBlockhash = blockhash;

  const signed = await window.solana.signTransaction(tx);
  const sig = await connection.sendRawTransaction(signed.serialize());

  const verify = await fetch("/api/verify",{
    method:"POST",
    headers:{ "Content-Type":"application/json" },
    body:JSON.stringify({ wallet, signature:sig })
  });

  const result = await verify.json();

  document.getElementById("status").innerText =
    result.error || ("Success: "+result.war+" WAR");

}
</script>

</body>
</html>
