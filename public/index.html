<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://unpkg.com/@solana/web3.js@latest/lib/index.iife.js"></script>

<style>
body{
  margin:0;
  background:radial-gradient(circle,#050505,#000);
  color:white;
  font-family:sans-serif;
}

.card{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  width:90%;
  max-width:420px;
  background:#0f0f0f;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 30px rgba(0,255,150,0.2);
  display:flex;
  flex-direction:column;
  gap:12px;
}

button{
  padding:14px;
  border:none;
  border-radius:10px;
  background:#00ff99;
  font-weight:bold;
  cursor:pointer;
}

input{
  padding:14px;
  border-radius:10px;
  border:none;
  background:#1a1a1a;
  color:white;
}

.progress{
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.bar{
  height:100%;
  width:0%;
  background:#00ff99;
  transition:0.5s;
}
</style>
</head>

<body>

<div class="card">

<h2>WAR TOKEN PRESALE</h2>

<button onclick="connect()">Connect Wallet</button>
<div id="wallet"></div>

<input id="amountInput" placeholder="0.1 - 1 SOL">

<button onclick="mint()">Mint</button>

<div class="progress">
  <div id="bar" class="bar"></div>
</div>

<div id="progress"></div>
<div id="status"></div>

</div>

<script>
let wallet = null;

// ================= CONNECT =================
async function connect(){
  try{
    const res = await window.solana.connect();
    wallet = res.publicKey.toString();
    document.getElementById("wallet").innerText = wallet;
  }catch(e){
    alert("Wallet connection failed");
  }
}

// ================= LOAD STATS =================
async function load(){

  try{
    const r = await fetch("/api/stats");
    const d = await r.json();

    const max = 100000000;
    const percent = (d.total / max) * 100;

    document.getElementById("bar").style.width = percent + "%";
    document.getElementById("progress").innerText =
      d.total + " / " + max + " WAR";

  }catch(e){
    console.log("stats error");
  }
}

// load awal + interval ringan
load();
setInterval(load, 15000);

// ================= MINT =================
async function mint(){

  if(!wallet){
    alert("Connect wallet first");
    return;
  }

  const amount = Number(document.getElementById("amountInput").value);

  if(!amount || amount < 0.1 || amount > 1){
    alert("Invalid amount (0.1 - 1 SOL)");
    return;
  }

  const status = document.getElementById("status");
  status.innerText = "Preparing transaction...";

  try{

    // 1. GET RECEIVER FROM BACKEND
    const req = await fetch("/api/createTx",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({ wallet, amount })
    });

    const data = await req.json();

    if(data.error){
      status.innerText = data.error;
      return;
    }

    // 2. CREATE TX (pakai public RPC biar ringan)
    const conn = new solanaWeb3.Connection(
      "https://api.mainnet-beta.solana.com"
    );

    const tx = new solanaWeb3.Transaction().add(
      solanaWeb3.SystemProgram.transfer({
        fromPubkey: window.solana.publicKey,
        toPubkey: new solanaWeb3.PublicKey(data.to),
        lamports: amount * 1e9
      })
    );

    tx.feePayer = window.solana.publicKey;
    tx.recentBlockhash = (await conn.getLatestBlockhash()).blockhash;

    status.innerText = "Waiting for signature...";

    // 3. SIGN
    const signed = await window.solana.signTransaction(tx);

    status.innerText = "Sending transaction...";

    // 4. SEND (NO BLOCK)
    const sig = await conn.sendRawTransaction(signed.serialize());

    status.innerText = "Transaction sent... verifying...";

    // 5. VERIFY KE BACKEND (TANPA NUNGGU CONFIRM)
    const verify = await fetch("/api/verify",{
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        wallet,
        signature: sig
      })
    });

    const result = await verify.json();

    if(result.error){
      status.innerText = result.error;
    }else{
      status.innerText = "SUCCESS 🚀";
      load();
    }

  }catch(err){
    console.error(err);
    status.innerText = "Transaction failed";
  }
}
</script>

</body>
</html>
